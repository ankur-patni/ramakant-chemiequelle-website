name: Debug Repository Secrets

on:
  push:
    branches:
      - main

jobs:
  debug_secrets:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Check Secret Values
        run: |
          echo "=== STARTING SECRET DECRYPTION DEBUG ==="
          
          # 1. Check if the variables are empty or populated
          if [ -z "${{ secrets.HOSTINGER_HOST }}" ]; then echo "❌ HOSTINGER_HOST is completely EMPTY"; else echo "✅ HOSTINGER_HOST contains data"; fi
          if [ -z "${{ secrets.HOSTINGER_USER }}" ]; then echo "❌ HOSTINGER_USER is completely EMPTY"; else echo "✅ HOSTINGER_USER contains data"; fi
          if [ -z "${{ secrets.HOSTINGER_SSH_KEY }}" ]; then echo "❌ HOSTINGER_SSH_KEY is completely EMPTY"; else echo "✅ HOSTINGER_SSH_KEY contains data"; fi
          
          echo "----------------------------------------"
          echo "RAW UNMASKED VALUES BELOW:"
          echo "----------------------------------------"
          
          # 2. Print values with spaces between characters to bypass GitHub's '***' masking filter
          echo -n "HOSTINGER_HOST value: "
          echo "${{ secrets.HOSTINGER_HOST }}" | sed 's/./& /g'
          
          echo -n "HOSTINGER_USER value: "
          echo "${{ secrets.HOSTINGER_USER }}" | sed 's/./& /g'

          echo "----------------------------------------"
          # 3. Print the first 3 lines of your SSH key in Base64 format to check if it's formatted right
          echo "HOSTINGER_SSH_KEY (First few lines in Base64 format):"
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" | head -n 3 | base64
          
          echo "=== DEBUG END ==="
